trigger:
  branches:
    include:
      - master

pool:
  vmImage: windows-2022

variables:
  buildConfiguration: Release
  buildPlatform: AnyCPU
  azureServiceConnection: CAESAzureProd
  webAppName: UCDStudentService

steps:
  - task: NuGetToolInstaller@1
    displayName: Use NuGet

  - task: NuGetCommand@2
    displayName: Restore NuGet packages
    inputs:
      command: restore
      restoreSolution: StudentService.sln

  - task: VSBuild@1
    displayName: Build web deploy package
    inputs:
      solution: StudentService/StudentService.csproj
      platform: '$(buildPlatform)'
      configuration: '$(buildConfiguration)'
      msbuildArgs: >
        /p:DeployOnBuild=true
        /p:WebPublishMethod=Package
        /p:PackageAsSingleFile=true
        /p:SkipInvalidConfigurations=true
        /p:PackageLocation="$(Build.ArtifactStagingDirectory)\StudentService.zip"

  - task: PublishBuildArtifacts@1
    displayName: Publish build artifact
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: drop

  - task: AzureRmWebAppDeployment@4
    displayName: Deploy to Azure App Service
    inputs:
      ConnectionType: AzureRM
      azureSubscription: '$(azureServiceConnection)'
      appType: webApp
      WebAppName: '$(webAppName)'
      packageForLinux: '$(Build.ArtifactStagingDirectory)\StudentService.zip'
      enableCustomDeployment: true
      DeploymentType: webDeploy
      TakeAppOfflineFlag: true
